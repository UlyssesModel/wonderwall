# Default adapter configuration.
#
# Aligned to kirk-cli's two-layer pipeline:
#   - Layer 1: 16×16 blocks, inference_features per block
#   - Layer 2: 32×32 assembled feature matrix, inference_entropy
#
# The projection adapter taps off Layer 2 (D-006 in DECISIONS.md), so n=32.
#
# llm_hidden_dim must match the target LLM. Confirmed 2026-05-04 against
# scotty-gpu (10.128.0.16:11434) — `ollama show gemma4:31b` reports
# gemma4.embedding_length = 5376. (Same as the prior Gemma 3 27B
# placeholder, so no numeric change.) Re-run `make pin-gemma` against the
# active Scotty endpoint after any model upgrade.

n: 32
llm_hidden_dim: 5376
hidden_dim: 1024
use_complex: false      # Production Kirk: real-valued log-returns, imag=0
dropout: 0.0
pos_embedding_init_std: 0.02
