# Default training config.
#
# Realistic numbers assume H100 80GB or A100 80GB hardware. For development
# on smaller GPUs, swap llm_gemma4.yaml for a 1B–9B model and lower
# grad_accum_steps proportionally.

distill_path: "data/distilled_train.pt"
save_path: "checkpoints/adapter.pt"

num_epochs: 3
learning_rate: 1.0e-4
weight_decay: 0.0
log_every_steps: 10
save_every_epochs: 1
grad_accum_steps: 4
use_amp: true
