# Adapter config for the cost-knob demo path (Pipeline C train-stub against
# Gemma 3 12B instead of Gemma 4 31B).
#
# Identical to adapter_default.yaml except llm_hidden_dim is matched to
# Gemma 3 12B (3840) so the projection adapter's output_dim aligns with the
# LLM's embedding layer. Use this when running `make demo` on a GPU that
# can't fit Gemma 4 31B at bf16 (anything <80GB; e.g. scotty-gpu's
# A100-SXM4-40GB).
#
# Pair with configs/llm_gemma3_12b.yaml:
#
#   WONDERWALL_LLM_CONFIG=configs/llm_gemma3_12b.yaml \
#   WONDERWALL_ADAPTER_CONFIG=configs/adapter_demo.yaml \
#   make demo
#
# Production demo (Gemma 4 31B, ≥80GB GPU) keeps using the default pair
# (configs/adapter_default.yaml + configs/llm_gemma4.yaml).

n: 32
llm_hidden_dim: 3840
hidden_dim: 1024
use_complex: false      # Production Kirk: real-valued log-returns, imag=0
dropout: 0.0
pos_embedding_init_std: 0.02
